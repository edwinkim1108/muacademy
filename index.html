<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>무아카데미 관리 시스템 - 고도화 버전</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
:root {
  --bg1: #ffffff; --bg2: #f8fafc; --bg3: #f1f5f9;
  --text1: #0f172a; --text2: #475569; --text3: #94a3b8;
  --accent: #38bdf8;
}

/* Step 1: 반응형 디자인 */
.app {
  width: 100%; max-width: 1280px; margin: 0 auto;
  min-height: 100vh; display: flex; flex-direction: column;
  background: var(--bg2); font-family: -apple-system, sans-serif;
}
@media (min-width: 768px) {
  .app { flex-direction: row; }
  .nav { width: 90px; flex-direction: column; }
  .screen { flex: 1; padding: 24px; }
}

/* Step 4: 수업 상태 색상 */
.cc { padding: 12px; margin: 8px 0; border-radius: 10px; border-left: 5px solid #ccc; }
.cc.green { border-color: #22c55e; background: #f0fdf4; }
.cc.yellow { border-color: #eab308; background: #fefce8; }
.cc.red { border-color: #ef4444; background: #fef2f2; }

/* 요일 버튼 */
.day-btn {
  padding: 8px 14px; margin: 4px; border: 2px solid #ddd;
  border-radius: 9999px; cursor: pointer; font-size: 13px;
}
.day-btn.on { background: #0f172a; color: white; border-color: #0f172a; }

/* 기타 스타일 */
.card { background: white; border-radius: 12px; padding: 16px; margin-bottom: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
</style>
</head>
<body>

<div class="app">
  <div class="hdr" style="background:#0f172a;color:white;padding:16px">
    <h2>무아카데미 관리 시스템</h2>
  </div>

  <!-- 원생 화면 -->
  <div class="screen" id="screen-stu">
    <h2>원생 관리</h2>
    <div id="stuList"></div>

    <!-- 원생 등록 폼 (Step 2 적용) -->
    <div class="card">
      <h3>새 원생 등록</h3>
      <input type="text" id="name" placeholder="이름" style="width:100%;padding:10px;margin:8px 0"><br>
      
      <div>요일별 수업 시간</div>
      <div id="daySelect"></div>
      
      <button onclick="addStudent()" style="margin-top:12px;padding:10px 20px;background:#0f172a;color:white;border:none;border-radius:8px;cursor:pointer">
        원생 등록
      </button>
    </div>
  </div>
</div>

<script>
// 기본 데이터
let students = [];

// Step 2 + 3: 요일별 수업시간 + 5분 단위
const days = ['월','화','수','목','금'];

function renderDayButtons() {
  const container = document.getElementById('daySelect');
  container.innerHTML = days.map((day, i) => `
    <button class="day-btn" data-day="${i}" onclick="toggleDay(this)">${day}요일 
      <input type="time" id="time_${i}" value="15:00" step="300">
    </button>
  `).join('');
}

function toggleDay(btn) {
  btn.classList.toggle('on');
}

function addStudent() {
  const name = document.getElementById('name').value.trim();
  if (!name) return alert("이름을 입력하세요");

  const schedule = [];
  document.querySelectorAll('.day-btn.on').forEach(btn => {
    const dayIndex = parseInt(btn.dataset.day);
    const timeInput = document.getElementById(`time_${dayIndex}`);
    schedule.push({
      day: days[dayIndex],
      time: timeInput ? timeInput.value : "15:00"
    });
  });

  students.push({ id: Date.now(), name, schedule, status: 'green' });
  alert(`${name} 원생이 등록되었습니다.`);
  renderStudents();
}

function renderStudents() {
  // 간단한 리스트 출력 (실제로는 더 복잡한 UI 적용 가능)
  console.log("등록된 원생:", students);
}

// 초기화
renderDayButtons();
</script>
</body>
</html>
