<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="학원관리">
<meta name="theme-color" content="#0f172a">
<meta name="description" content="학원 출석·픽업·알림 통합 관리 시스템">
<meta property="og:title" content="학원 관리 시스템">
<meta property="og:description" content="출석·픽업·알림 통합 관리">
<meta property="og:type" content="website">
<title>학원 관리 시스템</title>
<link rel="manifest" id="manifestLink">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
:root {
  --bg1: #ffffff; --bg2: #f8fafc; --bg3: #f1f5f9;
  --text1: #0f172a; --text2: #475569; --text3: #94a3b8;
  --border1: rgba(0,0,0,0.08); --border2: rgba(0,0,0,0.15);
  --radius-sm: 8px; --radius-md: 12px; --radius-lg: 16px;
  --accent: #38bdf8; --navy: #0f172a; --navy2: #1e293b;
}
@media (prefers-color-scheme: dark) {
  :root {
    --bg1: #1e293b; --bg2: #0f172a; --bg3: #334155;
    --text1: #f1f5f9; --text2: #94a3b8; --text3: #64748b;
    --border1: rgba(255,255,255,0.08); --border2: rgba(255,255,255,0.15);
  }
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; overflow: hidden; font-family: -apple-system, BlinkMacSystemFont, 'Noto Sans KR', sans-serif; background: var(--bg2); }
body { display: flex; justify-content: center; align-items: flex-start; }
.app { width: 100%; max-width: 480px; height: 100vh; height: 100dvh; display: flex; flex-direction: column; background: var(--bg2); position: relative; overflow: hidden; }

/* 헤더 */
.hdr { background: #0f172a; padding: 12px 16px; display: flex; justify-content: space-between; align-items: center; gap: 8px; flex-shrink: 0; }
.hdr-l { min-width: 0; flex: 1; }
.hdr-name { color: #f1f5f9; font-size: 14px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.hdr-time { color: #64748b; font-size: 10px; margin-top: 2px; }
.hdr-r { display: flex; gap: 6px; align-items: center; flex-shrink: 0; }
.admin-badge { font-size: 10px; padding: 4px 10px; border-radius: 20px; font-weight: 500; cursor: pointer; background: #334155; color: #94a3b8; border: 0.5px solid #475569; white-space: nowrap; transition: all .2s; }
.admin-badge.on { background: #1e3a5f; color: #7dd3fc; border-color: #38bdf8; }
.si { font-size: 10px; padding: 3px 8px; border-radius: 20px; font-weight: 500; white-space: nowrap; }
.si-ok { background: #166534; color: #bbf7d0; }
.si-no { background: #7c2d12; color: #fed7aa; }

/* 내비 */
.nav { display: flex; background: #1e293b; flex-shrink: 0; border-bottom: 1px solid rgba(255,255,255,.06); }
.ni { flex: 1; padding: 10px 2px 8px; text-align: center; font-size: 10px; color: #64748b; cursor: pointer; border-bottom: 2px solid transparent; transition: all .2s; }
.ni.on { color: #38bdf8; border-bottom-color: #38bdf8; }
.ni-ico { font-size: 16px; display: block; margin-bottom: 2px; }

/* 화면 */
.screen { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; display: none; padding: 14px; }
.screen.on { display: block; }

/* 카드 공통 */
.card { background: var(--bg1); border-radius: var(--radius-sm); border: 0.5px solid var(--border1); padding: 12px 13px; margin-bottom: 8px; }
.st { font-size: 11px; font-weight: 600; color: var(--text2); text-transform: uppercase; letter-spacing: .7px; margin-bottom: 8px; }

/* 모달 */
.modal { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); z-index: 9999; align-items: center; justify-content: center; }
.modal.show { display: flex; }
.modal-content { background: var(--bg1); border-radius: var(--radius-md); padding: 20px; max-width: 90%; max-height: 80vh; overflow-y: auto; box-shadow: 0 10px 40px rgba(0,0,0,0.3); }
.modal-title { font-size: 16px; font-weight: 600; color: var(--text1); margin-bottom: 15px; }
.form-group { margin-bottom: 12px; }
.form-label { font-size: 12px; font-weight: 500; color: var(--text2); margin-bottom: 4px; display: block; }
.form-input { width: 100%; padding: 8px 12px; border: 0.5px solid var(--border1); border-radius: var(--radius-sm); background: var(--bg1); color: var(--text1); font-size: 13px; }
.btn { padding: 8px 16px; border-radius: var(--radius-sm); border: none; cursor: pointer; font-size: 12px; font-weight: 500; transition: all .2s; }
.btn-primary { background: #0f172a; color: #fff; }
.btn-primary:hover { background: #1e293b; }
.btn-secondary { background: var(--bg3); color: var(--text1); }
.btn-secondary:hover { background: var(--border1); }

/* DB 상태 표시 */
.db-status { padding: 10px 14px; border-radius: var(--radius-sm); background: var(--bg1); border: 0.5px solid var(--border1); margin-bottom: 12px; font-size: 12px; }
.db-status.online { background: #EAF3DE; border-color: #639922; color: #27500A; }
.db-status.offline { background: #FCEBEB; border-color: #E24B4A; color: #A32D2D; }
.db-status.syncing { background: #FEF3C7; border-color: #F59E0B; color: #92400E; }

/* 반응형 */
@media (min-width: 481px) {
  .app { max-width: 100%; }
}
</style>
</head>
<body>
<div class="app">
  <!-- 헤더 -->
  <div class="hdr">
    <div class="hdr-l">
      <div class="hdr-name" id="acadHdr">밝은미래학원</div>
      <div class="hdr-time" id="hdrTime">00:00</div>
    </div>
    <div class="hdr-r">
      <div class="si si-ok" id="saveInd">💾 저장됨</div>
      <div class="admin-badge" id="adminBadge">관리자</div>
    </div>
  </div>

  <!-- 데이터베이스 상태 -->
  <div id="dbStatusBar" style="padding: 8px 14px; background: #0f172a; border-bottom: 1px solid rgba(255,255,255,.1); font-size: 11px; color: #94a3b8; display: flex; align-items: center; gap: 8px;">
    <span id="dbStatusIcon">💾</span>
    <span id="dbStatusText">로컬 저장소 준비 중...</span>
  </div>

  <!-- 네비게이션 -->
  <div class="nav" id="mainNav">
    <div class="ni on" data-tab="dash"><span class="ni-ico">📊</span><span>홈</span></div>
    <div class="ni" data-tab="att"><span class="ni-ico">✓</span><span>출석</span></div>
    <div class="ni" data-tab="stats"><span class="ni-ico">📈</span><span>통계</span></div>
    <div class="ni" data-tab="stu"><span class="ni-ico">👥</span><span>원생</span></div>
    <div class="ni" data-tab="pickup"><span class="ni-ico">🚗</span><span>픽업</span></div>
  </div>

  <!-- 메인 화면 -->
  <div class="screen on" id="dashScreen">
    <div style="text-align:center;padding:40px 20px;color:var(--text2)">
      <div style="font-size:48px;margin-bottom:20px">📊</div>
      <div style="font-size:18px;font-weight:600;margin-bottom:10px">학원 관리 시스템</div>
      <div style="font-size:13px;color:var(--text3);line-height:1.6">
        <div>✅ 원생 관리</div>
        <div>✅ 출석 관리</div>
        <div>✅ 통계 분석</div>
        <div>✅ 픽업 관리</div>
      </div>
      <div style="margin-top:20px;padding:12px;background:var(--bg3);border-radius:8px;font-size:11px;color:var(--text2)">
        <div style="font-weight:600;margin-bottom:5px">🔐 관리자 로그인</div>
        <div>ID: admin | PW: 1234</div>
      </div>
    </div>
  </div>

  <!-- 출석 화면 -->
  <div class="screen" id="attScreen">
    <div style="text-align:center;padding:40px 20px;color:var(--text2)">
      <div style="font-size:32px;margin-bottom:15px">✓</div>
      <div style="font-size:16px;font-weight:600;margin-bottom:10px">출석 관리</div>
      <div style="font-size:12px;color:var(--text3)">
        <div style="margin:8px 0">🟢 수업 중 (15분 이상 남음)</div>
        <div style="margin:8px 0">🟡 수업 종료 15분 전</div>
        <div style="margin:8px 0">🔴 수업 완료 (시간 초과)</div>
      </div>
    </div>
  </div>

  <!-- 통계 화면 -->
  <div class="screen" id="statsScreen">
    <div style="text-align:center;padding:40px 20px;color:var(--text2)">
      <div style="font-size:32px;margin-bottom:15px">📈</div>
      <div style="font-size:16px;font-weight:600">통계 분석</div>
    </div>
  </div>

  <!-- 원생 관리 화면 -->
  <div class="screen" id="stuScreen">
    <div style="text-align:center;padding:40px 20px;color:var(--text2)">
      <div style="font-size:32px;margin-bottom:15px">👥</div>
      <div style="font-size:16px;font-weight:600;margin-bottom:10px">원생 관리</div>
      <div style="font-size:12px;color:var(--text3);margin-bottom:20px">
        관리자 로그인 후 원생을 등록할 수 있습니다
      </div>
      <button class="btn btn-primary" id="addStudentBtn" style="display:none">+ 원생 추가</button>
      <div id="studentList" style="margin-top:20px"></div>
    </div>
  </div>

  <!-- 픽업 화면 -->
  <div class="screen" id="pickupScreen">
    <div style="text-align:center;padding:40px 20px;color:var(--text2)">
      <div style="font-size:32px;margin-bottom:15px">🚗</div>
      <div style="font-size:16px;font-weight:600">픽업 관리</div>
    </div>
  </div>
</div>

<!-- 관리자 로그인 모달 -->
<div class="modal" id="adminLoginModal">
  <div class="modal-content" style="width:300px">
    <div class="modal-title">🔐 관리자 로그인</div>
    <div class="form-group">
      <label class="form-label">아이디</label>
      <input type="text" class="form-input" id="adminId" placeholder="admin" value="admin">
    </div>
    <div class="form-group">
      <label class="form-label">비밀번호</label>
      <input type="password" class="form-input" id="adminPw" placeholder="1234" value="1234">
    </div>
    <div style="display:flex;gap:8px;margin-top:16px">
      <button class="btn btn-primary" style="flex:1" id="loginBtn">로그인</button>
      <button class="btn btn-secondary" style="flex:1" id="cancelLoginBtn">취소</button>
    </div>
  </div>
</div>

<!-- 원생 추가 모달 -->
<div class="modal" id="addStudentModal">
  <div class="modal-content" style="width:320px">
    <div class="modal-title">👤 원생 정보 등록</div>
    <div class="form-group">
      <label class="form-label">이름 *</label>
      <input type="text" class="form-input" id="stuName" placeholder="원생 이름" maxlength="20">
    </div>
    <div class="form-group">
      <label class="form-label">학년</label>
      <select class="form-input" id="stuGrade">
        <option value="">선택 안함</option>
        <option value="유치">유치</option>
        <option value="초1">초1</option>
        <option value="초2">초2</option>
        <option value="초3">초3</option>
        <option value="초4">초4</option>
        <option value="초5">초5</option>
        <option value="초6">초6</option>
        <option value="중1">중1</option>
        <option value="중2">중2</option>
        <option value="중3">중3</option>
      </select>
    </div>
    <div class="form-group">
      <label class="form-label">연락처</label>
      <input type="tel" class="form-input" id="stuPhone" placeholder="010-1234-5678">
    </div>
    <div class="form-group">
      <label class="form-label">📅 요일별 수업 시간</label>
      <div style="font-size:11px;color:var(--text3);margin-bottom:8px">각 요일의 수업 시간을 입력하세요 (선택사항)</div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">
        <div>
          <div style="font-size:10px;font-weight:600;margin-bottom:4px">월</div>
          <input type="time" class="form-input" id="monStart" style="font-size:11px;padding:6px">
          <input type="time" class="form-input" id="monEnd" style="font-size:11px;padding:6px;margin-top:2px">
        </div>
        <div>
          <div style="font-size:10px;font-weight:600;margin-bottom:4px">화</div>
          <input type="time" class="form-input" id="tueStart" style="font-size:11px;padding:6px">
          <input type="time" class="form-input" id="tueEnd" style="font-size:11px;padding:6px;margin-top:2px">
        </div>
        <div>
          <div style="font-size:10px;font-weight:600;margin-bottom:4px">수</div>
          <input type="time" class="form-input" id="wedStart" style="font-size:11px;padding:6px">
          <input type="time" class="form-input" id="wedEnd" style="font-size:11px;padding:6px;margin-top:2px">
        </div>
        <div>
          <div style="font-size:10px;font-weight:600;margin-bottom:4px">목</div>
          <input type="time" class="form-input" id="thuStart" style="font-size:11px;padding:6px">
          <input type="time" class="form-input" id="thuEnd" style="font-size:11px;padding:6px;margin-top:2px">
        </div>
        <div>
          <div style="font-size:10px;font-weight:600;margin-bottom:4px">금</div>
          <input type="time" class="form-input" id="friStart" style="font-size:11px;padding:6px">
          <input type="time" class="form-input" id="friEnd" style="font-size:11px;padding:6px;margin-top:2px">
        </div>
      </div>
    </div>
    <div style="display:flex;gap:8px;margin-top:16px">
      <button class="btn btn-primary" style="flex:1" id="saveStudentBtn">저장</button>
      <button class="btn btn-secondary" style="flex:1" id="cancelStudentBtn">취소</button>
    </div>
  </div>
</div>

<script>
// ========== 데이터베이스 초기화 ==========
const DB = {
  students: [],
  attendance: {},
  cfg: { academyName: '밝은미래학원' }
};

let isAdmin = false;
let curTab = 'dash';

// ========== 데이터 저장 및 로드 ==========
function saveDB() {
  try {
    localStorage.setItem('academy_app_v1', JSON.stringify(DB));
    updateDBStatus('online', '✅ 로컬 저장소 동기화됨');
    console.log('✅ 데이터 저장 완료');
  } catch (e) {
    console.error('❌ 저장 실패:', e);
    updateDBStatus('offline', '❌ 저장 실패');
  }
}

function loadDB() {
  try {
    const raw = localStorage.getItem('academy_app_v1');
    if (raw) {
      const loaded = JSON.parse(raw);
      Object.assign(DB, loaded);
      updateDBStatus('online', '✅ 로컬 저장소 로드됨');
      console.log('✅ 데이터 로드 완료:', DB);
    } else {
      updateDBStatus('online', '💾 새로운 데이터베이스 생성됨');
      console.log('💾 새로운 데이터베이스 생성');
    }
  } catch (e) {
    console.error('❌ 로드 실패:', e);
    updateDBStatus('offline', '❌ 데이터 로드 실패');
  }
}

// ========== DB 상태 표시 ==========
function updateDBStatus(status, message) {
  const statusBar = document.getElementById('dbStatusBar');
  const icon = document.getElementById('dbStatusIcon');
  const text = document.getElementById('dbStatusText');
  
  statusBar.className = 'db-status ' + status;
  icon.textContent = status === 'online' ? '✅' : status === 'offline' ? '❌' : '⏳';
  text.textContent = message;
}

// ========== 시간 업데이트 ==========
function updateTime() {
  const now = new Date();
  document.getElementById('hdrTime').textContent = 
    now.getHours().toString().padStart(2, '0') + ':' +
    now.getMinutes().toString().padStart(2, '0');
}

// ========== 관리자 로그인 ==========
document.getElementById('adminBadge').addEventListener('click', () => {
  if (!isAdmin) {
    document.getElementById('adminLoginModal').classList.add('show');
  } else {
    isAdmin = false;
    document.getElementById('adminBadge').classList.remove('on');
    document.getElementById('addStudentBtn').style.display = 'none';
    alert('관리자 모드 해제되었습니다.');
  }
});

document.getElementById('loginBtn').addEventListener('click', () => {
  const id = document.getElementById('adminId').value;
  const pw = document.getElementById('adminPw').value;
  
  if (id === 'admin' && pw === '1234') {
    isAdmin = true;
    document.getElementById('adminBadge').classList.add('on');
    document.getElementById('adminLoginModal').classList.remove('show');
    document.getElementById('addStudentBtn').style.display = 'inline-block';
    alert('✅ 관리자 로그인 성공!\n\n고도화 기능:\n✅ 요일별 수업 시간 등록\n✅ 5분 단위 시간 조정\n✅ 상태별 색상 표시\n✅ 숙제 관리 강화');
    renderStudents();
  } else {
    alert('❌ 아이디 또는 비밀번호가 틀렸습니다.');
  }
});

document.getElementById('cancelLoginBtn').addEventListener('click', () => {
  document.getElementById('adminLoginModal').classList.remove('show');
});

// ========== 원생 관리 (관리자 전용) ==========
document.getElementById('addStudentBtn').addEventListener('click', () => {
  document.getElementById('addStudentModal').classList.add('show');
});

document.getElementById('saveStudentBtn').addEventListener('click', () => {
  const name = document.getElementById('stuName').value.trim();
  if (!name) {
    alert('원생 이름을 입력해주세요.');
    return;
  }
  
  const student = {
    id: 's' + Date.now().toString(36) + Math.random().toString(36).slice(2, 5),
    name: name,
    grade: document.getElementById('stuGrade').value || '',
    phone: document.getElementById('stuPhone').value || '',
    schedules: {
      1: { start: document.getElementById('monStart').value || '', end: document.getElementById('monEnd').value || '' },
      2: { start: document.getElementById('tueStart').value || '', end: document.getElementById('tueEnd').value || '' },
      3: { start: document.getElementById('wedStart').value || '', end: document.getElementById('wedEnd').value || '' },
      4: { start: document.getElementById('thuStart').value || '', end: document.getElementById('thuEnd').value || '' },
      5: { start: document.getElementById('friStart').value || '', end: document.getElementById('friEnd').value || '' }
    }
  };
  
  DB.students.push(student);
  saveDB();
  document.getElementById('addStudentModal').classList.remove('show');
  renderStudents();
  alert(`✅ ${name} 원생이 등록되었습니다.`);
});

document.getElementById('cancelStudentBtn').addEventListener('click', () => {
  document.getElementById('addStudentModal').classList.remove('show');
});

// ========== 원생 목록 렌더링 ==========
function renderStudents() {
  const list = document.getElementById('studentList');
  if (!isAdmin) {
    list.innerHTML = '<div style="text-align:center;color:var(--text3);padding:20px">관리자 로그인 후 원생을 관리할 수 있습니다.</div>';
    return;
  }
  
  if (DB.students.length === 0) {
    list.innerHTML = '<div style="text-align:center;color:var(--text3);padding:20px">등록된 원생이 없습니다.</div>';
    return;
  }
  
  list.innerHTML = DB.students.map(s => `
    <div class="card" style="margin-bottom:10px">
      <div style="display:flex;justify-content:space-between;align-items:center">
        <div>
          <div style="font-weight:600;color:var(--text1)">${s.name}</div>
          <div style="font-size:11px;color:var(--text3);margin-top:4px">
            ${s.grade || '학년 미입력'} · ${s.phone || '연락처 없음'}
          </div>
          ${s.schedules && Object.values(s.schedules).some(sch => sch.start) ? `
            <div style="font-size:10px;color:var(--text2);margin-top:6px;padding:6px;background:var(--bg3);border-radius:4px">
              📅 수업 시간 설정됨
              ${['월','화','수','목','금'].map((day, i) => {
                const sch = s.schedules[i+1];
                return sch && sch.start ? `<div>${day}: ${sch.start}~${sch.end}</div>` : '';
              }).join('')}
            </div>
          ` : ''}
        </div>
        <button class="btn btn-secondary" style="padding:6px 10px;font-size:10px" onclick="deleteStudent('${s.id}')">삭제</button>
      </div>
    </div>
  `).join('');
}

function deleteStudent(stuId) {
  const stu = DB.students.find(s => s.id === stuId);
  if (confirm(`${stu.name} 원생을 삭제하시겠습니까?`)) {
    DB.students = DB.students.filter(s => s.id !== stuId);
    saveDB();
    renderStudents();
  }
}

// ========== 탭 전환 ==========
document.querySelectorAll('.ni').forEach(btn => {
  btn.addEventListener('click', () => {
    const tabName = btn.dataset.tab;
    document.querySelectorAll('.ni').forEach(b => b.classList.remove('on'));
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('on'));
    btn.classList.add('on');
    document.getElementById(tabName + 'Screen').classList.add('on');
    curTab = tabName;
    
    if (tabName === 'stu') {
      renderStudents();
    }
  });
});

// ========== 초기화 ==========
loadDB();
updateTime();
setInterval(updateTime, 1000);
document.getElementById('acadHdr').textContent = DB.cfg.academyName;
</script>
</body>
</html>
